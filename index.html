<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✠Pesquisa✠</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
}

/* BODY CORRIGIDO */
body {
    background-color: #121212;
    color: #ffffff;
    font-family: 'Inter', sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;

    min-height: 100vh; /* ao invés de height fixo */
}

/* CONTEÚDO CENTRAL */
.main {
    flex: 1; /* empurra footer pra baixo */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
}

/* CONTAINER */
.search-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 450px;
}

textarea {
    font-size: 1.1rem;
    padding: 15px;
    height: 250px;
    border: 2px solid #ffffff;
    border-radius: 5px;
    background-color: #1e1e1e;
    color: #ffffff;
    resize: none;
    text-align: center;
    margin-bottom: 25px;
    width: 100%;
}

button {
    font-size: 1.1rem;
    padding: 12px 25px;
    border: none;
    border-radius: 5px;
    background-color: #000000;
    color: #ffffff;
    cursor: pointer;
    width: 200px;
}

button:hover {
    background-color: #333333;
}

/* FOOTER CORRETO (SEM absolute) */
footer {
    width: 100%;
    background-color: #000000;
    display: flex;
    justify-content: center;
    padding: 15px 0;
}

/* CONTAINER INTERNO */
.footer-inner {
    width: 100%;
    max-width: 1000px;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
}

/* TIMERS */
.countdown {
    display: flex;
    gap: 25px;
}

.time-block {
    text-align: center;
}

.time {
    font-size: 1.8rem;
    font-weight: 600;
    color: #d0d0d0;
}

.label {
    font-size: 0.75rem;
    color: #6e6e6e;
}

</style>
</head>

<body>

<div class="main">
    <div class="search-container">

        <form id="ticketForm">
            <textarea id="ticketIds" required></textarea>
            <button type="submit">Pesquisa</button>
        </form>

        <form id="crmForm">
            <textarea id="crmTicketIds" required></textarea>
            <button type="submit">CRM</button>
        </form>

    </div>
</div>

<footer>
    <div class="footer-inner">
        <div class="countdown" id="countdownWork"></div>
        <div class="countdown" id="countdownCustom"></div>
    </div>
</footer>

<script>

// INPUT
function processInput(input) {
    return input.trim().split(/[\s,]+/)
        .filter(id => id.length === 7 && !isNaN(id));
}

// OPEN
function searchTickets(ticketIds, urlTemplate) {
    ticketIds.forEach((ticketId) => {
        const id = ticketId.trim();

        if (id.length === 7 && !isNaN(id)) {
            const url = urlTemplate.replace('{ticketId}', id);
            window.open(url, '_blank');
        }
    });
}

// EVENTS
document.getElementById("ticketForm").onsubmit = e => {
    e.preventDefault();
    searchTickets(
        processInput(ticketIds.value),
        'https://support.sevensuite.com.br/TicketDossier/{ticketId}/OpenBySequentialId'
    );
};

document.getElementById("crmForm").onsubmit = e => {
    e.preventDefault();
    searchTickets(
        processInput(crmTicketIds.value),
        'https://grafana-adm.byseven.com.br/d/c0VSoEVV3/notas-adicionais-dos-chamados?var-Chamado={ticketId}'
    );
};

// TIMER 18h
function updateWork() {
    const now = new Date();
    let target = new Date();
    target.setHours(18,0,0,0);

    if (now >= target) target.setDate(target.getDate()+1);

    const diff = target - now;

    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);

    countdownWork.innerHTML =
        `<div class="time-block"><div class="time">${h}</div><div class="label">Horas</div></div>
         <div class="time-block"><div class="time">${m}</div><div class="label">Minutos</div></div>
         <div class="time-block"><div class="time">${s}</div><div class="label">Segundos</div></div>`;
}

// TIMER ANUAL
function updateMeta() {
    const now = new Date();
    let year = now.getFullYear();
    let target = new Date(year,1,2,8,0,0);

    if (now > target) target = new Date(year+1,1,2,8,0,0);

    const diff = target - now;

    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);

    countdownCustom.innerHTML =
        `<div class="time-block"><div class="time">${d}</div><div class="label">Dias</div></div>
         <div class="time-block"><div class="time">${h}</div><div class="label">Horas</div></div>
         <div class="time-block"><div class="time">${m}</div><div class="label">Minutos</div></div>
         <div class="time-block"><div class="time">${s}</div><div class="label">Segundos</div></div>`;
}

setInterval(() => {
    updateWork();
    updateMeta();
}, 1000);

updateWork();
updateMeta();

</script>

</body>
</html>
